# DEV SERVER PORT
server:
  port: ${env.SERVER_PORT}

# DATABASE CONFIGURATION
spring:
  datasource:
#    url: jdbc:mysql://127.0.0.1:3306/auth_app
    url: jdbc:mysql://localhost:3306/auth_app
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # Mail configuration (Gmail example — use App Password, not your real password)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

#    hikari:
#      pool-name: HikariCP
#      maximum-pool-size: 5
#      connection-timeout: 10000
#      idle-timeout: 600000
#      max-lifetime: 1800000
#      validation-timeout: 1800000
#      initialization-fail-timeout: -1

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  # OAuth2 Client Configuration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            # /login/oauth2/code/google
            scope:
              - email
              - profile
              - openid
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            # /login/oauth2/code/github
            scope:
              - read:user
              - user:email

#    show-sql: true

logging:
  level:
    org.springframework.security: DEBUG

security:
  jwt:
#    secret: "${JWT_SECRET:ZmFrZS1qd3Qtc2VjcmV0LWtleS0yNTYtYml0LXN1cGVyLXNlY3VyZQ==}"
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS}
    refresh-token-cookie-name: ${JWT_REFRESH_COOKIE_NAME}
    cookie-secure: ${JWT_COOKIE_SECURE}
    cookie-http-only: ${JWT_HTTP_COOKIE_ONLY:true}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:lax}
    cookie-domain: ${JWT_COOKIE_DOMAIN}

# Front end URL configuration
app:
  auth:
    frontend:
      success-redirect: http://localhost:5173/auth/success
      failure-redirect: http://localhost:5173/auth/failure
      # reset-password-url: http://localhost:5173/reset-password
      login-url: http://localhost:5173/login

